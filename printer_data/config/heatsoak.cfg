###############################################################################
# HEAT_SOAK MACRO - 15.04.25
# 
# Purpose:
#   On a RatRig V-Core 4 with a large aluminum/steel gantry, the heat generated
#   during the first layer can cause slight thermal expansion. This "bi-metal"
#   effect can bend the gantry downward if it is not given enough time to warm up
#   and stabilize. The HEAT_SOAK macro lets you preheat (and then soak) the bed
#   for a specified duration, allowing the gantry to reach a stable temperature
#   before starting the actual print. This helps maintain a more consistent
#   Z offset, reducing first-layer issues and preventing failed prints.
#
# How It Works:
#   1. The macro sets a target bed temperature (TARGET) and a soak duration (DURATION).
#   2. It homes the printer, moves the gantry to a safe position, and then starts
#      heating the bed while running a fan to circulate air inside the build area.
#   3. The macro pauses the print job so you don’t accidentally start printing
#      before the bed (and gantry) are fully heated.
#   4. Once the bed reaches the target temperature, the macro begins a “soaking” phase
#      for the specified time. This is when the gantry is allowed to come up to
#      temperature and settle.
#   5. After soaking finishes, the macro re-homes, performs any required calibration
#      (like Z_TILT_ADJUST), and finally resumes the print.
#   6. If you need to cancel the soak early, you can call CANCEL_HEAT_SOAK, which stops
#      heating, turns off the fan, and resets variables. 
#
# Usage:
#   - Invoke with:  HEAT_SOAK TARGET=<bed_temp> DURATION=<minutes>
#   - The macro logs progress via RATOS_ECHO and M117 messages, showing when heating
#     starts, when soaking begins, how long remains, etc.
#   - To cancel partway, run: CANCEL_HEAT_SOAK
#
# Notes:
#   - This approach is especially useful if your first-layer prints are failing or
#     showing inconsistent extrusion due to Z offset drift from thermal expansion.
#   - Adjust the soak time and target temp to suit your particular printer setup.
###############################################################################


[gcode_macro HEAT_SOAK]
description: heats the bed for a while, use TARGET to set bed temp and DURATION to set the time in minutes to soak
#Settings for the heatsoak marco, you can overwrite these in your printer.cfg
variable_park_y_location: 250
variable_park_z_location: 5

#!!! Internal variables do not change these !!!
variable_stage: None ## heating -> soaking -> done -> None
variable_target_temp: 0
## in seconds
variable_check_interval: 10
variable_soak_time_remaining: 0
variable_total_time_elapsed: 0

gcode:
    {% set TARGET = params.TARGET | default(0) | float %}
    {% set DURATION = (params.DURATION | default(5) | int) * 60 %} ## minutes to seconds

    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=target_temp         VALUE={ TARGET }
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=stage               VALUE="'heating'"
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_time_remaining VALUE={ DURATION }
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=total_time_elapsed  VALUE=0

    ;; put the bed and nozzle where they're a safe distance apart
    RATOS_ECHO PREFIX="HEATSOAK" MSG="Place gantry in save possition in the center and park toolheads"
    ;; Force printer to home
    G28
    G90
    ;; Pause the print job until heatsoak is done or canceled
    ;; PAUSE_BASE
    PAUSE
    ;;TODO: Add idex recovery, now force it to IDEX_SINGLE
    ;;Place IDEX_COPY or IDEX_MIRROR after heatsoak macro to use these modes.
    IDEX_SINGLE
    IDEX_PARK
    G0 Z{park_z_location} F7200
    G0 Y{park_y_location} F7200
    M84 ;; turn off steppers

    ;; run the fan to circulate air
    RATOS_ECHO PREFIX="HEATSOAK" MSG="Set filter fan to 50%"
    SET_FAN_SPEED FAN=filter SPEED=0.5

    RATOS_ECHO PREFIX="HEATSOAK" MSG="Starting heatsoak with Temp: {TARGET} FOR  {DURATION}  seconds"
    ;; fire up the heater
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={ TARGET }
    UPDATE_DELAYED_GCODE ID=heat_soaker DURATION={ check_interval }

[gcode_macro HEAT_SOAK_CANCEL]
description: cancels an in-progress HEAT_SOAK cycle
gcode:
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=stage VALUE="'cancel'"
    UPDATE_DELAYED_GCODE ID=heat_soaker DURATION=1

[gcode_macro HEAT_SOAK_SKIP]
description: Early finish an in-progress HEAT_SOAK cycle.
gcode:
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=stage VALUE="'done'"
    UPDATE_DELAYED_GCODE ID=heat_soaker DURATION=1

[delayed_gcode heat_soaker]
gcode:   
    ## debug
    ;{ action_respond_info( printer['gcode_macro HEAT_SOAK'] | tojson )}
    
    {% set heat_soak = printer["gcode_macro HEAT_SOAK"] %}
 
    ## update total time elapsed
    {% set total_time_elapsed = heat_soak.total_time_elapsed + heat_soak.check_interval %}
    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=total_time_elapsed VALUE={ total_time_elapsed }

    {% set stage = heat_soak.stage %}
    {% if stage == "heating" and printer.heater_bed.temperature >= heat_soak.target_temp %}
        {% set stage = "soaking" %}
    {% endif %}

    {% if stage == "soaking" %}
        ## update soak countdown
        {% set soak_time_remaining = [heat_soak.soak_time_remaining - heat_soak.check_interval, 0] | max %}
        SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_time_remaining VALUE={ soak_time_remaining }
        {% if soak_time_remaining == 0 %}
            RATOS_ECHO PREFIX="HEATSOAK" MSG="Soaking done"
            {% set stage = "done" %}
        {% endif %}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=stage VALUE="'{ stage }'"

    {% if stage in ("done", "cancel") %}
        {% if stage == "cancel" %}
            RATOS_ECHO PREFIX="HEATSOAK" MSG="Heatsoaking cancel"
            {% set stage = "done" %}
            TURN_OFF_HEATERS
            M107 ; turn off fan
            M117 { "soak cancelled after ~%.1fm" | format(total_time_elapsed / 60.0) }
            CANCEL
        {% else %}
            ;; Need to be homed before you run RESUME
            G28
            Z_TILT_ADJUST
            RESUME
            M117 { "soak complete after %.1fm" | format(total_time_elapsed / 60.0) }
        {% endif %}

        ## reset all state vars, except stage, which may be queried via the api
        SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=target_temp         VALUE=0
        SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=soak_time_remaining VALUE=0
        SET_GCODE_VARIABLE MACRO=HEAT_SOAK VARIABLE=total_time_elapsed  VALUE=0

    {% else %}

        {% if total_time_elapsed % 10 == 0 %}
           ## output status periodically
           {% if stage == "heating" %}
                RATOS_ECHO PREFIX="HEATSOAK" MSG="{ 'heating -- %.1fm elapsed' | format(total_time_elapsed / 60.0) }"
            {% elif stage == "soaking" %}
                RATOS_ECHO PREFIX="HEATSOAK" MSG="{ 'soaking -- %.1fm remaining' | format(soak_time_remaining / 60.0) }"
            {% endif %}
        {% endif %}

        ## trigger ourselves again
        UPDATE_DELAYED_GCODE ID=heat_soaker DURATION={ heat_soak.check_interval }
        ## dwell for 1ms to prevent from going idle
        G4 P1

    {% endif %}
