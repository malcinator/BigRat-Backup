########################################################
# NOZZLE SCRUB CONFIGURATION (NON-IDEX ONLY)	       #
########################################################

[gcode_macro _NOZZLE_SCRUB_CONFIG]
description: User-defined coordinates and parameters for non-IDEX nozzle scrubbing
variable_x_start: MUST BE DEFINED ; Minimum X coordinates for the front arm wiper (where the scrub routine begins)
variable_x_end: MUST BE DEFINED ; Maximum X coordinates for the front arm wiper (where the scrub routine ends)
variable_y: MUST BE DEFINED ; Y coordinate for the front arm wiper
variable_z_safe_height: 20.0 ; Safe Z height for travel moves
variable_z_scrub_height: 0.2 ; Z height for the scrub routine to occur (default is 0.2 for safety)
variable_scrub_speed: 60000 ; Movement speed used in cleaning operation, in mm/min (e.g. 600 = 10mm/s, 6000 = 100mm/s, 6000 = 1000mm/s, etc)
variable_scrub_temp: 150 ; Nozzle temperature used during scrubbing operation (default is 150)
variable_scrub_count: 10 ; Number of passes the nozzle completes during scrubbing routine (default is 10)

gcode:
  ; Configuration macro — no runtime gcode

[gcode_macro _NOZZLE_SCRUB_STATE]
description: Tracks whether the nozzle has already been scrubbed
variable_scrub_done: False
gcode:
  ; State tracking macro — no runtime gcode

###########################################
# Nozzle Scrub Macro (non-IDEX)
###########################################

[gcode_macro NOZZLE_SCRUB]
description: Deep clean nozzle (non-IDEX)
gcode:
  {% if printer.dual_carriage is defined %}
    RESPOND TYPE=error MSG="This macro is not for IDEX printers."
  {% else %}
    {% set config = printer["gcode_macro _NOZZLE_SCRUB_CONFIG"] %}
    {% set state = printer["gcode_macro _NOZZLE_SCRUB_STATE"] %}
    {% set was_relative = printer.gcode.move_relative %}
    {% set y_center = ((printer.toolhead.axis_minimum.y + printer.toolhead.axis_maximum.y) / 2)|int %}

    {% if not state.scrub_done|default(false) %}
      SAVE_GCODE_STATE NAME=nozzle_scrub_non_idex_state

      G90
      MAYBE_HOME

      RESPOND PREFIX="info" MSG="Starting nozzle scrub..."
      {% if printer.extruder.temperature < config.scrub_temp %}
		RESPOND PREFIX="info" MSG="Heating nozzle to { config.scrub_temp }°C..."
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={config.scrub_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={config.scrub_temp}
      {% endif %}

      RESPOND PREFIX="info" MSG="Moving nozzle to wipe position..."
      G1 Z{config.z_safe_height} F600
      G1 X{config.x_start} Y{config.y} F36000
      G1 Z{config.z_scrub_height} F600

      RESPOND PREFIX="info" MSG="Scrubbing nozzle..."
      {% for i in range(config.scrub_count|int) %}
        G1 X{config.x_end} F{config.scrub_speed * 60}
        G1 X{config.x_start} F{config.scrub_speed * 60}
      {% endfor %}

      G1 Z{config.z_safe_height} F600
      SET_GCODE_VARIABLE MACRO=_NOZZLE_SCRUB_STATE VARIABLE=scrub_done VALUE=True
      RESPOND PREFIX="info" MSG="Nozzle scrubbing complete"

      G1 Y{y_center} F36000
      RESTORE_GCODE_STATE NAME=nozzle_scrub_non_idex_state

      {% if was_relative %}
        G91
      {% else %}
        G90
      {% endif %}
    {% else %}
      RESPOND PREFIX="info" MSG="Nozzle already scrubbed — skipping"
    {% endif %}
  {% endif %}

######################################################################################
# USER_HOOK Macros to use Nozzle Deep Clean macros in automated START_PRINT routines #
######################################################################################

#    UNCOMMENT BELOW TO USE     #

[gcode_macro _USER_START_PRINT_BEFORE_HOMING]
description: Scrub nozzle before mesh or beacon probing
gcode:
  NOZZLE_SCRUB

[gcode_macro _USER_END_PRINT_FINISHED]
description: Reset scrub flag after print completion
gcode:
  SET_GCODE_VARIABLE MACRO=_NOZZLE_SCRUB_STATE VARIABLE=scrub_done VALUE=False